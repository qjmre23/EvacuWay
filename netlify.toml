# EvacuWay — Netlify deployment configuration.
#
# Build pipeline:
#   1. Install & build the React/Vite frontend (output → frontend/dist)
#   2. Netlify bundles web/netlify/functions/api.py as a Python Lambda function
#
# Runtime routing:
#   /health       →  /.netlify/functions/api   (FastAPI health check)
#   /api/*        →  /.netlify/functions/api   (all API calls)
#   /*            →  /index.html               (SPA client-side routing)
#
# The frontend is built with VITE_API_URL="" so axios uses relative URLs,
# which hit the redirects above and land on the serverless function.

[build]
  command   = ""
  publish   = "frontend/dist"
  functions = "web/netlify/functions"

[build.environment]
  PYTHON_VERSION  = "3.11"

# ── API routes → serverless function ──────────────────────────────────────── #

[[redirects]]
  from   = "/health"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api"
  status = 200
  force  = true

# ── Hide Replit brand badge (Netlify-only injection) ─────────────────────── #

[[snippets]]
  location = "head"
  contents = "<style>[data-key='brand']{display:none!important;visibility:hidden!important;opacity:0!important;pointer-events:none!important}</style>"

# ── SPA fallback (must be last) ───────────────────────────────────────────── #

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
